services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fundle
      POSTGRES_PASSWORD: fundle
      POSTGRES_DB: fundle
    ports:
      - "5432:5432"
    volumes:
      - fundle_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fundle"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  fundle_pg:
