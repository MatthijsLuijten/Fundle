name: Build daily puzzle

on:
  schedule:
    # The build script pre-builds *tomorrow's* puzzle (and backfills today's if
    # missing), so puzzles go live at Amsterdam midnight simply by already
    # being in the database — no build has to succeed at 00:00.
    #
    # Primary trigger is the Supabase pg_cron job (supabase/migrations/
    # 0003_evening_prebuild_cron.sql): a workflow_dispatch in the Amsterdam
    # evening plus a retry slot 2.5h later. This GitHub morning cron is an
    # independent safety net in case that path breaks (expired PAT, Supabase
    # hiccup) — note GitHub may auto-disable it after 60 days without repo
    # activity, which is why it is the net and not the primary. Everything is
    # idempotent, so overlapping runs are cheap no-ops.
    - cron: "5 6 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Puzzle date (YYYY-MM-DD, default: today in Europe/Amsterdam)"
        required: false
      force:
        description: "Rebuild even if a puzzle already exists for the date"
        type: boolean
        default: false

concurrency:
  group: build-daily-puzzle
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Cheap early-exit so no-op scheduled runs don't bother installing the
      # toolchain. This only short-circuits; the build step below does its own
      # authoritative existence check. On any uncertainty (a puzzle missing, or
      # the query failed) we fall through and let the script decide.
      - name: Skip if today's and tomorrow's puzzles already exist
        id: precheck
        if: github.event_name != 'workflow_dispatch'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          today=$(TZ=Europe/Amsterdam date +%F)
          tomorrow=$(TZ=Europe/Amsterdam date -d tomorrow +%F)
          rows=$(curl -fsS \
            "$SUPABASE_URL/rest/v1/daily_puzzles?puzzle_date=in.($today,$tomorrow)&select=puzzle_date" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" 2>/dev/null || echo "ERR")
          if echo "$rows" | grep -q "$today" && echo "$rows" | grep -q "$tomorrow"; then
            echo "Puzzles for $today and $tomorrow already exist; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Puzzle for $today or $tomorrow not found yet (or check failed); building."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install uv
        if: steps.precheck.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        if: steps.precheck.outputs.skip != 'true'
        run: uv sync --project apps/api

      - name: Build and publish puzzle
        if: steps.precheck.outputs.skip != 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PRICE_BUCKETS: ${{ vars.PRICE_BUCKETS }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.date }}" ]; then ARGS="$ARGS --date ${{ inputs.date }}"; fi
          if [ "${{ inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          uv run --project apps/api python scripts/build_daily_puzzle.py $ARGS
