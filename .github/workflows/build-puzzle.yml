name: Build daily puzzle

on:
  schedule:
    # Primary trigger is the Supabase pg_cron job (supabase/migrations/
    # 0001_daily_puzzle_cron.sql), which POSTs workflow_dispatch right at
    # Amsterdam midnight. This GitHub cron is only a best-effort safety net in
    # case that trigger ever fails: it guarantees a puzzle exists by morning.
    # Amsterdam 07:00 (summer) / 08:00 (winter). The build script is idempotent,
    # so on a normal day this run is a cheap no-op.
    - cron: "5 6 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Puzzle date (YYYY-MM-DD, default: today in Europe/Amsterdam)"
        required: false
      force:
        description: "Rebuild even if a puzzle already exists for the date"
        type: boolean
        default: false

concurrency:
  group: build-daily-puzzle
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Cheap early-exit so the ~23 no-op runs/day don't bother installing the
      # toolchain. This only short-circuits; the build step below does its own
      # authoritative existence check. On any uncertainty (puzzle missing, or
      # the query failed) we fall through and let the script decide.
      - name: Skip if today's puzzle already exists
        id: precheck
        if: github.event_name != 'workflow_dispatch'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          today=$(TZ=Europe/Amsterdam date +%F)
          rows=$(curl -fsS \
            "$SUPABASE_URL/rest/v1/daily_puzzles?puzzle_date=eq.$today&select=puzzle_date" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" 2>/dev/null || echo "ERR")
          if [ "$rows" = "[]" ] || [ "$rows" = "ERR" ]; then
            echo "Puzzle for $today not found yet (or check failed); building."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "Puzzle for $today already exists; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install uv
        if: steps.precheck.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v6

      - name: Install dependencies
        if: steps.precheck.outputs.skip != 'true'
        run: uv sync --project apps/api

      - name: Build and publish puzzle
        if: steps.precheck.outputs.skip != 'true'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PRICE_BUCKETS: ${{ vars.PRICE_BUCKETS }}
        run: |
          ARGS=""
          if [ -n "${{ inputs.date }}" ]; then ARGS="$ARGS --date ${{ inputs.date }}"; fi
          if [ "${{ inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          uv run --project apps/api python scripts/build_daily_puzzle.py $ARGS
